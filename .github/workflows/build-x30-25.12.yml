name: Build TOTOLINK X30 OpenWrt 25.12

on:
  workflow_dispatch:
  schedule:
    # Weekly Saturday 03:00 UTC
    - cron: "0 3 * * 6"

permissions:
  contents: write

concurrency:
  group: x30-openwrt-25.12
  cancel-in-progress: false

env:
  OPENWRT_REF: openwrt-25.12
  X30_PATCH_COMMIT: 1e4bed859aeb3c7047ee602866d833efed853e2d
  BUILD_JOBS: 2

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout builder repository
        uses: actions/checkout@v5

      - name: Show builder repository contents
        shell: bash
        run: |
          set -euo pipefail
          pwd
          find . -maxdepth 3 -type f | sort

      - name: Free disk space
        shell: bash
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h

          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true

          echo "Disk after cleanup:"
          df -h

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev libelf-dev \
            python3 python3-pyelftools python3-setuptools \
            rsync swig unzip zlib1g-dev file wget curl time jq

      - name: Clone OpenWrt stable branch
        shell: bash
        run: |
          set -euo pipefail

          git clone \
            --branch "${OPENWRT_REF}" \
            --single-branch \
            https://github.com/openwrt/openwrt.git openwrt

          cd openwrt
          echo "OpenWrt branch:"
          git branch --show-current
          echo "OpenWrt HEAD:"
          git log -1 --oneline

      - name: Prepare X30 source tree
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          cd openwrt

          git config user.name "x30-builder"
          git config user.email "x30-builder@example.invalid"

          UPSTREAM_SHA="$(git rev-parse --short=12 HEAD)"
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"

          echo "Checking whether X30 support already exists in ${OPENWRT_REF}..."
          if grep -q "Device/totolink_X30" target/linux/mediatek/image/filogic.mk; then
            echo "X30 support already exists in ${OPENWRT_REF}; local patch will not be applied."
            PATCH_ID="official"
          else
            echo "Applying pinned X30 patch: ${X30_PATCH_COMMIT}"
            test -f "../patches/0001-mediatek-add-TOTOLINK-X30-support.patch"
            git am --3way "../patches/0001-mediatek-add-TOTOLINK-X30-support.patch"
            PATCH_ID="${X30_PATCH_COMMIT:0:12}"
          fi

          echo "Verifying X30 profile after patch/official support check..."
          grep -n "Device/totolink_X30" target/linux/mediatek/image/filogic.mk
          grep -n "TARGET_DEVICES += totolink_X30" target/linux/mediatek/image/filogic.mk

          echo "Files changed relative to OpenWrt branch:"
          git status --short
          git log -1 --oneline

          TAG="x30-25.12-${UPSTREAM_SHA}-${PATCH_ID}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "patch_id=${PATCH_ID}" >> "$GITHUB_OUTPUT"

          if git -C "$GITHUB_WORKSPACE" ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Release tag ${TAG} already exists. Nothing new to build."
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "This is a new build tag: ${TAG}"
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update feeds
        if: steps.prep.outputs.skip_build != 'true'
        working-directory: openwrt
        shell: bash
        run: |
          set -euo pipefail

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure build
        if: steps.prep.outputs.skip_build != 'true'
        working-directory: openwrt
        shell: bash
        run: |
          set -euo pipefail

          cp ../config/x30.config .config

          echo "Seed config:"
          cat .config

          make defconfig

          echo "Resolved target/device/package config:"
          grep -E 'CONFIG_TARGET_mediatek|CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_totolink_X30|CONFIG_PACKAGE_luci|CONFIG_BUILD_LOG' .config || true

          if ! grep -q '^CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_totolink_X30=y' .config; then
            echo "ERROR: X30 target device was not selected after make defconfig."
            exit 1
          fi

          echo "OpenWrt diffconfig:"
          ./scripts/diffconfig.sh

          echo "OpenWrt make info entries matching x30/totolink:"
          make info | grep -Ei 'x30|totolink' || true

      - name: Download sources
        if: steps.prep.outputs.skip_build != 'true'
        working-directory: openwrt
        shell: bash
        run: |
          set -euo pipefail

          make download -j"$(nproc)"

      - name: Build firmware
        if: steps.prep.outputs.skip_build != 'true'
        working-directory: openwrt
        shell: bash
        run: |
          set -o pipefail

          echo "Disk before build:"
          df -h

          if ! make -j"${BUILD_JOBS}" V=s 2>&1 | tee ../build.log; then
            echo "Parallel build failed. Retrying single-threaded to expose exact failing command..."
            make -j1 V=sc 2>&1 | tee ../build-single.log
            exit 1
          fi

          echo "Disk after build:"
          df -h

      - name: Collect artifacts
        if: steps.prep.outputs.skip_build != 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p out
          cd openwrt

          TARGET_DIR="bin/targets/mediatek/filogic"

          if [ ! -d "${TARGET_DIR}" ]; then
            echo "ERROR: target directory does not exist: ${TARGET_DIR}"
            echo "Existing bin/targets tree:"
            find bin/targets -maxdepth 4 -type f -printf '%p\n' | sort || true
            exit 1
          fi

          echo "Full target directory contents:"
          find "${TARGET_DIR}" -maxdepth 2 -type f -printf '%p\n' | sort

          echo "Searching for X30/TOTOLINK firmware artifacts:"
          find "${TARGET_DIR}" -maxdepth 1 -type f \
            \( -iname '*x30*' -o -iname '*totolink*' \) \
            -printf '%p\n' | sort | tee ../x30-artifact-list.txt

          if [ ! -s ../x30-artifact-list.txt ]; then
            echo "ERROR: No X30/TOTOLINK firmware artifacts found."
            echo "This means the build completed, but no output filename matched x30/totolink."
            echo "Full target directory contents were:"
            find "${TARGET_DIR}" -maxdepth 2 -type f -printf '%p\n' | sort
            exit 1
          fi

          while IFS= read -r artifact; do
            cp -v "$artifact" ../out/
          done < ../x30-artifact-list.txt

          for meta in sha256sums config.buildinfo feeds.buildinfo version.buildinfo profiles.json; do
            if [ -f "${TARGET_DIR}/${meta}" ]; then
              cp -v "${TARGET_DIR}/${meta}" "../out/${meta}"
            fi
          done

          ./scripts/diffconfig.sh > ../out/x30.diffconfig
          git rev-parse HEAD > ../out/openwrt-git-head.txt
          git log -1 --oneline > ../out/openwrt-git-log.txt
          cp ../x30-artifact-list.txt ../out/x30-artifact-list.txt

          cd ../out
          sha256sum * > BUILD-SHA256SUMS.txt

          echo "Final release artifact directory:"
          ls -lh

          echo "Sysupgrade image check:"
          if ! ls *x30*sysupgrade* *X30*sysupgrade* *totolink*sysupgrade* *TOTOLINK*sysupgrade* >/dev/null 2>&1; then
            echo "ERROR: No sysupgrade image found for X30/TOTOLINK."
            ls -lh
            exit 1
          fi

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: failed-build-diagnostics
          path: |
            build.log
            build-single.log
            x30-artifact-list.txt
            openwrt/.config
            openwrt/tmp/.config*
            openwrt/logs/**
            openwrt/bin/targets/mediatek/filogic/**
          if-no-files-found: ignore

      - name: Upload workflow artifact
        if: steps.prep.outputs.skip_build != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: openwrt-totolink-x30-25.12
          path: out/*
          if-no-files-found: error

      - name: Create GitHub release
        if: steps.prep.outputs.skip_build != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.prep.outputs.tag }}
          UPSTREAM_SHA: ${{ steps.prep.outputs.upstream_sha }}
          PATCH_ID: ${{ steps.prep.outputs.patch_id }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create "${TAG}" out/* \
            --title "TOTOLINK X30 OpenWrt 25.12 build ${TAG}" \
            --notes "Custom TOTOLINK X30 build from OpenWrt ${OPENWRT_REF}.

          Upstream OpenWrt branch SHA: ${UPSTREAM_SHA}
          X30 patch: ${PATCH_ID}
          Target: mediatek/filogic
          Device profile: totolink_X30

          Routine upgrades should use only:
          openwrt-mediatek-filogic-*x30*-squashfs-sysupgrade.bin

          Do not flash preloader.bin or bl31-uboot.fip for routine upgrades."
