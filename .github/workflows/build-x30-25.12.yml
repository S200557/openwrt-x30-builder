name: Build TOTOLINK X30 OpenWrt 25.12

on:
  workflow_dispatch:
  schedule:
    # Weekly Saturday 03:00 UTC
    - cron: "0 3 * * 6"

permissions:
  contents: write

concurrency:
  group: x30-openwrt-25.12
  cancel-in-progress: false

env:
  OPENWRT_REF: openwrt-25.12
  X30_PATCH_COMMIT: 1e4bed859aeb3c7047ee602866d833efed853e2d
  BUILD_JOBS: 2

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout builder repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev libelf-dev \
            python3 python3-pyelftools python3-setuptools \
            rsync swig unzip zlib1g-dev file wget curl time ccache jq

      - name: Clone OpenWrt stable branch
        run: |
          git clone \
            --branch "${OPENWRT_REF}" \
            --single-branch \
            https://github.com/openwrt/openwrt.git openwrt

          cd openwrt
          git log -1 --oneline
          git branch --show-current

      - name: Restore OpenWrt download cache
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ env.OPENWRT_REF }}-${{ hashFiles('config/x30.config') }}
          restore-keys: |
            openwrt-dl-${{ env.OPENWRT_REF }}-
            openwrt-dl-

      - name: Prepare X30 source tree
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          cd openwrt

          git config user.name "x30-builder"
          git config user.email "x30-builder@example.invalid"

          UPSTREAM_SHA="$(git rev-parse --short=12 HEAD)"
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"

          if grep -q "Device/totolink_X30" target/linux/mediatek/image/filogic.mk; then
            echo "X30 support already exists in ${OPENWRT_REF}; not applying local patch."
            PATCH_ID="official"
          else
            echo "Applying pinned X30 patch ${X30_PATCH_COMMIT}"
            git am --3way "../patches/0001-mediatek-add-TOTOLINK-X30-support.patch"
            PATCH_ID="${X30_PATCH_COMMIT:0:12}"
          fi

          if ! grep -q "Device/totolink_X30" target/linux/mediatek/image/filogic.mk; then
            echo "ERROR: X30 profile was not found after patching."
            exit 1
          fi

          TAG="x30-25.12-${UPSTREAM_SHA}-${PATCH_ID}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "patch_id=${PATCH_ID}" >> "$GITHUB_OUTPUT"

          if git -C "$GITHUB_WORKSPACE" ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Release tag ${TAG} already exists. Nothing new to build."
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update feeds
        if: steps.prep.outputs.skip_build != 'true'
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure build
        if: steps.prep.outputs.skip_build != 'true'
        working-directory: openwrt
        run: |
          cp ../config/x30.config .config
          make defconfig
          grep -E 'CONFIG_TARGET_mediatek|totolink_X30|CONFIG_PACKAGE_luci' .config
          ./scripts/diffconfig.sh

      - name: Download sources
        if: steps.prep.outputs.skip_build != 'true'
        working-directory: openwrt
        run: |
          make download -j"$(nproc)"

      - name: Build firmware
        if: steps.prep.outputs.skip_build != 'true'
        working-directory: openwrt
        run: |
          make -j"${BUILD_JOBS}" V=s

      - name: Collect artifacts
        if: steps.prep.outputs.skip_build != 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p out
          cd openwrt

          TARGET_DIR="bin/targets/mediatek/filogic"

          cp -v "${TARGET_DIR}"/*totolink_X30* ../out/
          cp -v "${TARGET_DIR}/sha256sums" ../out/sha256sums

          ./scripts/diffconfig.sh > ../out/x30.diffconfig
          git rev-parse HEAD > ../out/openwrt-git-head.txt
          git log -1 --oneline > ../out/openwrt-git-log.txt

          cd ../out
          sha256sum * > BUILD-SHA256SUMS.txt
          ls -lh

      - name: Upload workflow artifact
        if: steps.prep.outputs.skip_build != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-totolink-x30-25.12
          path: out/*

      - name: Create GitHub release
        if: steps.prep.outputs.skip_build != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.prep.outputs.tag }}
          UPSTREAM_SHA: ${{ steps.prep.outputs.upstream_sha }}
          PATCH_ID: ${{ steps.prep.outputs.patch_id }}
        run: |
          gh release create "${TAG}" out/* \
            --title "TOTOLINK X30 OpenWrt 25.12 build ${TAG}" \
            --notes "Custom TOTOLINK X30 build from OpenWrt ${OPENWRT_REF}.

          Upstream OpenWrt branch SHA: ${UPSTREAM_SHA}
          X30 patch: ${PATCH_ID}
          Target: mediatek/filogic
          Device profile: totolink_X30

          Normal upgrades should use:
          openwrt-mediatek-filogic-totolink_X30-squashfs-sysupgrade.bin

          Do not flash preloader.bin or bl31-uboot.fip for routine upgrades."
